name: Integration Test (Hetzner)

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: hetzner-integration-test
  cancel-in-progress: false

jobs:
  nuke-before:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Remove run-tests label
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'run-tests'
            }).catch(() => {});

      - name: Nuke existing Hetzner resources
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          docker run --rm -e HCLOUD_TOKEN="$HCLOUD_TOKEN" \
            -v "$(pwd)/tests/hetzner-nuke-config.yml:/config.yaml:ro" \
            ghcr.io/cgroschupp/hetzner-nuke:v0.6.2 run --config /config.yaml --no-dry-run --no-prompt || true

  test:
    needs: nuke-before
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        k8s_version:
          - "v1.35.0"
          - "v1.34.3"
          - "v1.33.7"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run integration test (K8s ${{ matrix.k8s_version }})
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          K8S_VERSION: ${{ matrix.k8s_version }}
        run: bash tests/test-hetzner.sh

  nuke-after:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Nuke all Hetzner resources
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          docker run --rm -e HCLOUD_TOKEN="$HCLOUD_TOKEN" \
            -v "$(pwd)/tests/hetzner-nuke-config.yml:/config.yaml:ro" \
            ghcr.io/cgroschupp/hetzner-nuke:v0.6.2 run --config /config.yaml --no-dry-run --no-prompt || true
