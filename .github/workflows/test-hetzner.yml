name: Integration Test (Hetzner)

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: hetzner-integration-test
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Run integration test
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: bash tests/test-hetzner.sh
