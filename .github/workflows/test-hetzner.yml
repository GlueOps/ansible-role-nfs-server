name: Integration Test (Hetzner)

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: hetzner-integration-test
  cancel-in-progress: false

jobs:
  test:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Remove run-tests label
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'run-tests'
            }).catch(() => {});

      - name: Run integration test
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: bash tests/test-hetzner.sh

      - name: Nuke Hetzner resources
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          docker run --rm -e HCLOUD_TOKEN="$HCLOUD_TOKEN" \
            -v "$(pwd)/tests/hetzner-nuke-config.yml:/config.yaml:ro" \
            ghcr.io/cgroschupp/hetzner-nuke:v0.6.2 run --config /config.yaml --no-dry-run --no-prompt || true
